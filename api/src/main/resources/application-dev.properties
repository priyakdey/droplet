spring.datasource.url=jdbc:postgresql://localhost:5432/droplet
spring.datasource.username=droplet_user
spring.datasource.password=droplet_password

spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20

spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.username=droplet_user
spring.data.mongodb.password=droplet_password
